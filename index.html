  <style>
:root {
  --bg: #0f1420;
  --surface: #171d2b;
  --surface-2: #1f2738;
  --line: #2b3650;
  --text: #e7ecf5;
  --muted: #9aa6be;
  --accent: #7c5cff;
  --accent-soft: #2a2350;
  --good: #4ad6a6;
  --radius: 14px;
  --maxw: 720px;
  font-synthesis: none;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.app {
  max-width: var(--maxw);
  margin: 0 auto;
  padding: 32px 20px 80px;
  min-height: 100vh;
}

.screen { animation: fade 0.25s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* Intro */
.intro h1 {
  font-size: 3.4rem;
  margin: 0 0 2px;
  letter-spacing: 0.08em;
  font-weight: 800;
}
.intro .tagline {
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text);
  margin: 0 0 14px;
}
.acronym {
  font-size: 0.9rem;
  color: var(--muted);
  letter-spacing: 0.02em;
  margin: 0 0 22px;
}
.acronym span {
  color: var(--accent);
  font-weight: 700;
}
.intro .lede { color: var(--muted); font-size: 1.05rem; margin: 0 0 24px; }
.intro ul { color: var(--muted); padding-left: 18px; margin: 0 0 28px; }
.intro li { margin-bottom: 8px; }
.intro li strong { color: var(--text); }

/* Buttons */
.btn {
  appearance: none;
  border: 0;
  cursor: pointer;
  font: inherit;
  border-radius: 10px;
  padding: 14px 22px;
  background: var(--accent);
  color: #fff;
  font-weight: 600;
  transition: filter 0.15s ease, transform 0.05s ease;
}
.btn:hover { filter: brightness(1.08); }
.btn:active { transform: translateY(1px); }
.btn.secondary {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--line);
}
.btn.secondary:hover { color: var(--text); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Progress */
.progress { margin-bottom: 24px; }
.progress-bar {
  height: 6px;
  background: var(--surface-2);
  border-radius: 999px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 999px;
  transition: width 0.3s ease;
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 0.85rem;
  color: var(--muted);
}
.arm-tag {
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
}

/* Question */
.question h2 {
  font-size: 1.35rem;
  margin: 8px 0 22px;
  letter-spacing: -0.01em;
}
.options { display: grid; gap: 10px; }
.option {
  display: flex;
  align-items: center;
  gap: 14px;
  text-align: left;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px 18px;
  color: var(--text);
  font: inherit;
  cursor: pointer;
  transition: border-color 0.15s ease, background 0.15s ease;
}
.option:hover { border-color: var(--accent); background: var(--surface-2); }
.option.selected { border-color: var(--accent); background: var(--accent-soft); }

.nav { display: flex; justify-content: space-between; margin-top: 26px; }

/* Channel cue + Likert (deep / confirmation rounds) */
.statement {
  font-size: 1.35rem;
  line-height: 1.4;
  margin: 4px 0 26px;
  letter-spacing: -0.01em;
}
.channel-cue {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px 5px 8px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--muted);
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
  margin-bottom: 4px;
}
.flow-arrow {
  width: 16px;
  height: 16px;
  fill: none;
  stroke: var(--accent);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.likert { margin-top: 8px; }
.likert-ends {
  display: flex;
  justify-content: space-between;
  font-size: 0.8rem;
  color: var(--muted);
  margin-bottom: 8px;
}
.likert-scale { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.dot {
  appearance: none;
  font: inherit;
  cursor: pointer;
  aspect-ratio: 1 / 1;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--muted);
  font-weight: 700;
  font-size: 1.05rem;
  transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
}
.dot:hover { border-color: var(--accent); color: var(--text); }
.dot.selected { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Result */
.result .eyebrow {
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-size: 0.8rem;
  color: var(--muted);
  margin: 0 0 6px;
}
.result h1 { font-size: 2.4rem; margin: 0 0 14px; letter-spacing: -0.02em; }
.result h3 {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin: 28px 0 12px;
}
.confidence {
  background: var(--surface);
  border: 1px solid var(--line);
  border-left: 3px solid var(--accent);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 0.9rem;
  color: var(--muted);
  margin: 0 0 14px;
}
.lean {
  font-size: 1.1rem;
  line-height: 1.5;
  color: var(--text);
  margin: 6px 0 8px;
}

/* Two channels, two separate bars (never summed) */
.reads { display: grid; gap: 16px; }
.channel-read { display: grid; gap: 8px; }
.channel-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
.channel-label { font-weight: 600; }
.channel-sub { color: var(--muted); font-size: 0.85rem; }
.score-bar {
  height: 10px;
  background: var(--surface-2);
  border-radius: 999px;
  overflow: hidden;
}
.score-bar > span {
  display: block;
  height: 100%;
  background: var(--accent);
  border-radius: 999px;
  transition: width 0.4s ease;
}

/* Constellation */
.constellation { display: grid; gap: 8px; }
.con-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 10px;
}
.con-rel { display: flex; flex-direction: column; }
.con-name { font-weight: 600; }
.con-sub { color: var(--muted); font-size: 0.82rem; }
.con-tag {
  flex: 0 0 auto;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
}

/* Optional full read */
.full-toggle { margin-top: 22px; }
.full-read { margin-top: 14px; }
table.scores { width: 100%; border-collapse: collapse; }
table.scores th, table.scores td {
  text-align: right;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  font-variant-numeric: tabular-nums;
}
table.scores th { color: var(--muted); font-weight: 600; font-size: 0.82rem; }
table.scores td:first-child, table.scores th:first-child { text-align: left; }
table.scores tr.is-primary td { color: var(--text); font-weight: 700; }
table.scores tr.is-primary td:first-child { color: var(--accent); }
.note { font-size: 0.82rem; color: var(--muted); margin-top: 12px; line-height: 1.5; }

.result-tagline {
  margin: 30px 0 0;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
}

.footer-actions { margin-top: 16px; display: flex; gap: 12px; }

/* Reserved space for a future watermark (F-with-a-star). Empty for the beta. */
.watermark {
  position: fixed;
  right: 18px;
  bottom: 16px;
  width: 40px;
  height: 40px;
  pointer-events: none;
}

@media (max-width: 480px) {
  .intro h1 { font-size: 2.8rem; }
  .result h1 { font-size: 1.9rem; }
  .question h2 { font-size: 1.15rem; }
  .statement { font-size: 1.15rem; }
  .likert-scale { gap: 7px; }
  .dot { font-size: 0.95rem; border-radius: 10px; }
}

</style>

  <script>
// VIBE test — engine v3. Adaptive flow, non-linear scoring, flow lean.
// Reads window.QUIZ_DATA (assets/quiz-data.js, generated from the workbook).
//
// Founding law: energy is the imbalance. Never force scores even, never sum the
// two channels, never average to a midpoint. Measure the lean and read the lean.
//
// Mapping to the build brief:
//  - 1..5 answers carry NON-LINEAR weights {1:0,2:1,3:3,4:6,5:10} (s2).
//  - score(B,C) = sum(weights) / (items * 10) * 100, per channel (s3).
//  - Primary = the top MEASURED single channel score; tie-break by Sweep tally.
//    The old "seat between the peaks" rule is gone (s4).
//  - Shoulders fixed by position: Upstream U = P-1 (in), Downstream D = P+1 (out).
//    Both are always measured in the deep round (s5, s7).
//  - flow_lean = score(U,in) - score(D,out) (s6).
//  - Constellation by position: Echo P+5, Shadow P+4, Eclipse P+6 (s10).
//  - Channels box and constellation MUST show the same U/D profiles (s11).
//  - DATA.magnet are the "in" items, DATA.current are the "out" items.
(function () {
  "use strict";

  var DATA = window.QUIZ_DATA;
  var app = document.getElementById("app");
  var WHEEL = DATA.wheel;
  var N = WHEEL.length;

  // Non-linear answer weights (s2): the curve, not a linear multiplier, makes
  // confident extremes carry far more than the soft middle.
  var WEIGHTS = { 1: 0, 2: 1, 3: 3, 4: 6, 5: 10 };
  var MAX_WEIGHT = 10;

  // Adaptive-flow tuning (s7). The deep round measures the candidate plus its
  // shoulders plus a guard either side, so the seat can shift outward.
  var GUARD_RADIUS = 2;          // window = candidate +/- 2 (five bearings)
  var DEEP_PER_CHANNEL = 3;      // items per (bearing, channel) in the deep round
  var CONFIRM_PER_TYPE = 2;      // confirmation items per checked type
  var LEAN_BAND = 10;            // |flow_lean| below this reads as two-way
  var CLOSE_MARGIN = 8;          // top-two single scores within this => low conf
  var MAX_RESEAT = 4;            // safety bound on re-measuring loops

  // ---- Wheel helpers (positions 1..N) ----
  function posOf(type) { return WHEEL.indexOf(type) + 1; }
  function wrapPos(p) { return ((p - 1) % N + N) % N + 1; }
  function typeAt(p) { return WHEEL[wrapPos(p) - 1]; }
  function offset(p, k) { return wrapPos(p + k); }

  function bankFor(channel) { return channel === "in" ? DATA.magnet : DATA.current; }

  // ---- State (immutable updates) ----
  var state = {
    phase: "intro",        // intro | sweep | deep | confirm | result
    sweepIdx: 0,
    deepIdx: 0,
    confirmIdx: 0,
    sweepPicks: {},        // sweepId -> type
    deepResp: {},          // itemId -> 1..5
    confirmResp: {},       // itemId -> 1..5
    candidate: null,       // leading Sweep type
    deepQueue: [],         // asked deep items [{id,type,channel,item}]
    confirmQueue: [],      // asked confirmation items [{id,type,item}]
    reseats: 0
  };

  function setState(patch) { state = Object.assign({}, state, patch); render(); }

  // ---- Queue building ----
  function roundRobin(groups) {
    var out = [], i = 0, more = true;
    while (more) {
      more = false;
      for (var g = 0; g < groups.length; g++) {
        if (i < groups[g].length) { out.push(groups[g][i]); more = true; }
      }
      i++;
    }
    return out;
  }

  function itemsFor(type, channel) {
    return bankFor(channel)
      .filter(function (it) { return it.type === type; })
      .slice(0, DEEP_PER_CHANNEL)
      .map(function (it) { return { id: it.id, type: type, channel: channel, item: it.item }; });
  }

  function windowTypes(centerPos, radius) {
    var seen = {}, out = [];
    for (var k = -radius; k <= radius; k++) {
      var t = typeAt(centerPos + k);
      if (!seen[t]) { seen[t] = 1; out.push(t); }
    }
    return out;
  }

  function deepItemsForTypes(types) {
    var groups = [];
    types.forEach(function (t) {
      groups.push(itemsFor(t, "in"));
      groups.push(itemsFor(t, "out"));
    });
    return roundRobin(groups);
  }

  function measuredTypes() {
    var seen = {}, out = [];
    state.deepQueue.forEach(function (it) { if (!seen[it.type]) { seen[it.type] = 1; out.push(it.type); } });
    return out;
  }

  function sweepTally(picks) {
    var tally = {};
    WHEEL.forEach(function (t) { tally[t] = 0; });
    Object.keys(picks).forEach(function (k) { tally[picks[k]] += 1; });
    return tally;
  }

  // ---- Scoring (s2, s3) ----
  function channelScore(type, channel) {
    var asked = state.deepQueue.filter(function (it) {
      return it.type === type && it.channel === channel;
    });
    if (!asked.length) return null;
    var raw = 0, count = 0;
    asked.forEach(function (it) {
      var a = state.deepResp[it.id];
      if (typeof a === "number") { raw += WEIGHTS[a]; count += 1; }
    });
    if (!count) return null;
    return Math.round(raw / (count * MAX_WEIGHT) * 100); // 0..100
  }

  // Primary = top measured single channel score; tie-break by Sweep tally (s4).
  function computePrimary() {
    var tally = sweepTally(state.sweepPicks);
    var rows = measuredTypes().map(function (t) {
      var si = channelScore(t, "in") || 0;
      var so = channelScore(t, "out") || 0;
      return { type: t, pos: posOf(t), in: si, out: so, single: Math.max(si, so), tally: tally[t] || 0 };
    });
    rows.sort(function (a, b) {
      return b.single - a.single || b.tally - a.tally || a.pos - b.pos;
    });
    return rows;
  }

  // ---- Phase transitions ----
  function finishSweep(picks) {
    var tally = sweepTally(picks);
    var candidate = WHEEL.slice().sort(function (a, b) {
      return (tally[b] - tally[a]) || posOf(a) - posOf(b);
    })[0];
    var types = windowTypes(posOf(candidate), GUARD_RADIUS);
    setState({
      sweepPicks: picks,
      candidate: candidate,
      deepQueue: deepItemsForTypes(types),
      phase: "deep",
      deepIdx: 0,
      reseats: 0
    });
  }

  function finishDeep() {
    // Confirm the seat: the Primary and BOTH shoulders must be measured (s7.4).
    var rows = computePrimary();
    var P = rows[0].pos;
    var shoulders = [typeAt(offset(P, -1)), typeAt(offset(P, 1))];
    var have = {};
    measuredTypes().forEach(function (t) { have[t] = 1; });
    var missing = shoulders.filter(function (t) { return !have[t]; });

    if (missing.length && state.reseats < MAX_RESEAT) {
      var extra = deepItemsForTypes(missing);
      setState({
        deepQueue: state.deepQueue.concat(extra),
        deepIdx: state.deepIdx + 1,
        reseats: state.reseats + 1
      });
      return;
    }
    // Build confirmation over Primary + shoulders.
    var checkTypes = [rows[0].type].concat(shoulders).filter(function (t, i, a) {
      return a.indexOf(t) === i;
    });
    var groups = checkTypes.map(function (t) {
      return DATA.confirmation
        .filter(function (it) { return it.type === t; })
        .slice(0, CONFIRM_PER_TYPE)
        .map(function (it) { return { id: it.id, type: t, item: it.item }; });
    });
    setState({ confirmQueue: roundRobin(groups), phase: "confirm", confirmIdx: 0 });
  }

  // ---- DOM helper ----
  function el(tag, cls, html) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  }

  var ARROW_IN =
    "<svg class='flow-arrow' viewBox='0 0 24 24' aria-hidden='true'>" +
    "<path d='M12 3v12m0 0l-5-5m5 5l5-5' /><path d='M5 20h14' /></svg>";
  var ARROW_OUT =
    "<svg class='flow-arrow' viewBox='0 0 24 24' aria-hidden='true'>" +
    "<path d='M12 21V9m0 0l-5 5m5-5l5 5' /><path d='M5 4h14' /></svg>";

  // ---- Screens ----
  function renderIntro() {
    var s = el("section", "screen intro");
    s.appendChild(el("h1", null, DATA.title));
    s.appendChild(el("p", "tagline", "What&rsquo;s your vibe?"));
    s.appendChild(el("p", "acronym",
      "<span>V</span>itality &middot; <span>I</span>dentity &middot; " +
      "<span>B</span>earings &middot; <span>E</span>nergy"));
    s.appendChild(el("p", "lede",
      "A quick read on how you&rsquo;re wired, what charges you up and how you " +
      "show up. Take the VIBE test and get your VIBE type."));
    var ul = el("ul");
    ul.innerHTML =
      "<li>A few quick scenarios first, then a short set of statements.</li>" +
      "<li>Rate each statement from not me at all to exactly me.</li>" +
      "<li>No right answers and no balanced result. Go with what&rsquo;s true, not what sounds best.</li>";
    s.appendChild(ul);
    var start = el("button", "btn", "Take the VIBE test");
    start.addEventListener("click", function () { setState({ phase: "sweep", sweepIdx: 0 }); });
    s.appendChild(start);
    return s;
  }

  function progress(label, current, total) {
    var prog = el("div", "progress");
    var bar = el("div", "progress-bar");
    var fill = el("div", "progress-fill");
    fill.style.width = (total ? (current / total) * 100 : 0) + "%";
    bar.appendChild(fill);
    prog.appendChild(bar);
    var meta = el("div", "progress-meta");
    meta.appendChild(el("span", "arm-tag", label));
    meta.appendChild(el("span", null, current + " of " + total));
    prog.appendChild(meta);
    return prog;
  }

  function renderSweep() {
    var items = DATA.sweep;
    var q = items[state.sweepIdx];
    var s = el("section", "screen question");
    s.appendChild(progress("A few quick scenarios", state.sweepIdx + 1, items.length));
    s.appendChild(el("h2", null, q.question));

    var opts = el("div", "options");
    q.options.forEach(function (opt) {
      var b = el("button", "option");
      b.appendChild(el("span", "opt-text", opt.text));
      b.addEventListener("click", function () {
        var picks = Object.assign({}, state.sweepPicks);
        picks[q.id] = opt.type;
        if (state.sweepIdx < items.length - 1) setState({ sweepPicks: picks, sweepIdx: state.sweepIdx + 1 });
        else finishSweep(picks);
      });
      opts.appendChild(b);
    });
    s.appendChild(opts);
    if (state.sweepIdx > 0) {
      var nav = el("div", "nav");
      var back = el("button", "btn secondary", "Back");
      back.addEventListener("click", function () { setState({ sweepIdx: state.sweepIdx - 1 }); });
      nav.appendChild(back);
      s.appendChild(nav);
    }
    return s;
  }

  // Anchored 1..5 scale with a real middle (s1).
  function likertRow(itemId, store, onNext) {
    var current = state[store][itemId];
    var box = el("div", "likert");
    var ends = el("div", "likert-ends");
    ends.appendChild(el("span", null, "Not me at all"));
    ends.appendChild(el("span", null, "Sometimes"));
    ends.appendChild(el("span", null, "Exactly me"));
    box.appendChild(ends);
    var scale = el("div", "likert-scale");
    [1, 2, 3, 4, 5].forEach(function (v) {
      var b = el("button", "dot" + (current === v ? " selected" : ""), String(v));
      b.addEventListener("click", function () {
        var resp = Object.assign({}, state[store]);
        resp[itemId] = v;
        var patch = {}; patch[store] = resp;
        state = Object.assign({}, state, patch);
        render();
        window.setTimeout(onNext, 150);
      });
      scale.appendChild(b);
    });
    box.appendChild(scale);
    return box;
  }

  function renderDeep() {
    var queue = state.deepQueue;
    var item = queue[state.deepIdx];
    var s = el("section", "screen question");
    s.appendChild(progress("How much is this you?", state.deepIdx + 1, queue.length));

    var cue = el("div", "channel-cue " + item.channel);
    cue.innerHTML = (item.channel === "in" ? ARROW_IN : ARROW_OUT) +
      "<span>" + (item.channel === "in" ? "What flows to you" : "How your energy flows out") + "</span>";
    s.appendChild(cue);

    s.appendChild(el("h2", "statement", "&ldquo;" + item.item + "&rdquo;"));
    s.appendChild(likertRow(item.id, "deepResp", function () {
      if (state.deepIdx < state.deepQueue.length - 1) setState({ deepIdx: state.deepIdx + 1 });
      else finishDeep();
    }));

    var nav = el("div", "nav");
    var back = el("button", "btn secondary", "Back");
    back.disabled = state.deepIdx === 0;
    back.addEventListener("click", function () { if (state.deepIdx > 0) setState({ deepIdx: state.deepIdx - 1 }); });
    nav.appendChild(back);
    s.appendChild(nav);
    return s;
  }

  function renderConfirm() {
    var queue = state.confirmQueue;
    if (!queue.length) { setState({ phase: "result" }); return el("section"); }
    var item = queue[state.confirmIdx];
    var s = el("section", "screen question");
    s.appendChild(progress("One last check", state.confirmIdx + 1, queue.length));
    s.appendChild(el("h2", "statement", "&ldquo;" + item.item + "&rdquo;"));
    s.appendChild(likertRow(item.id, "confirmResp", function () {
      if (state.confirmIdx < queue.length - 1) setState({ confirmIdx: state.confirmIdx + 1 });
      else setState({ phase: "result" });
    }));
    return s;
  }

  // Confirmation items are reverse-scored: a high answer contradicts the type.
  function confirmContradiction(type) {
    var asked = state.confirmQueue.filter(function (it) { return it.type === type; });
    if (!asked.length) return null;
    var sum = 0, count = 0;
    asked.forEach(function (it) {
      var a = state.confirmResp[it.id];
      if (typeof a === "number") { sum += a; count += 1; }
    });
    return count ? sum / count : null; // mean 1..5; high => contradicts
  }

  function bar(label, sub, value) {
    var row = el("div", "channel-read");
    var head = el("div", "channel-head");
    head.appendChild(el("span", "channel-label", label));
    head.appendChild(el("span", "channel-sub", sub));
    row.appendChild(head);
    var track = el("div", "score-bar");
    var span = document.createElement("span");
    span.style.width = (value == null ? 0 : value) + "%";
    track.appendChild(span);
    row.appendChild(track);
    return row;
  }

  function leanSentence(inS, outS) {
    var lean = inS - outS;
    if (lean > LEAN_BAND)
      return "You tend to lean toward drawing in. You run more on what charges you than on what you put out.";
    if (lean < -LEAN_BAND)
      return "You tend to lean toward pushing out. You run more on what you express than on what you take in.";
    if (inS >= 55 && outS >= 55)
      return "You run strongly both ways, drawing in and pushing out in good measure.";
    return "Your two channels sit close together, with no strong lean either way.";
  }

  function renderResult() {
    var rows = computePrimary();
    var primary = rows[0];
    var P = primary.pos;
    var upType = typeAt(offset(P, -1));
    var downType = typeAt(offset(P, 1));
    var inS = channelScore(upType, "in") || 0;
    var outS = channelScore(downType, "out") || 0;

    // Confidence (s12).
    var reasons = [];
    if (state.candidate && state.candidate !== primary.type) reasons.push("seat-shift");
    [primary.type, upType, downType].forEach(function (t) {
      var c = confirmContradiction(t);
      if (c != null && c >= 3.5 && reasons.indexOf("confirm") < 0) reasons.push("confirm");
    });
    if (rows.length > 1 && (rows[0].single - rows[1].single) < CLOSE_MARGIN) reasons.push("close-scores");
    var lowConf = reasons.length > 0;

    var s = el("section", "screen result");
    s.appendChild(el("p", "eyebrow", "Your VIBE type"));
    s.appendChild(el("h1", null, primary.type));

    if (lowConf) {
      s.appendChild(el("p", "confidence",
        "Strong indication, not the final word. A couple of answers sat close, so it&rsquo;s worth a second sitting another day."));
    }

    // Flow lean — the core read (s6). A tendency, never a verdict.
    s.appendChild(el("div", "lean", leanSentence(inS, outS)));

    // Two channels, two separate bars, U for in and D for out (s5, s11).
    s.appendChild(el("h3", null, "Your two channels"));
    var reads = el("div", "reads");
    reads.appendChild(bar("What flows to you", "charges you up &middot; " + upType, inS));
    reads.appendChild(bar("How your energy flows out", "how you show up &middot; " + downType, outS));
    s.appendChild(reads);

    // Constellation by position — must show the SAME U/D as the channels (s11).
    s.appendChild(el("h3", null, "Your constellation"));
    var con = el("div", "constellation");
    [
      ["Flows to you", upType, "what charges and feeds you"],
      ["Flows out from you", downType, "where your energy goes"],
      ["Echo", typeAt(offset(P, 5)), "comes back round to you"],
      ["Shadow", typeAt(offset(P, 4)), "the one you tend to overpower"],
      ["Eclipse", typeAt(offset(P, 6)), "the one that tends to dim you"]
    ].forEach(function (r) {
      var node = el("div", "con-row");
      var left = el("div", "con-rel");
      left.appendChild(el("span", "con-name", r[1]));
      left.appendChild(el("span", "con-sub", r[2]));
      node.appendChild(left);
      node.appendChild(el("span", "con-tag", r[0]));
      con.appendChild(node);
    });
    s.appendChild(con);

    // Optional detail: every measured type, both channels.
    var toggle = el("button", "btn secondary full-toggle", "See the full read");
    var full = el("div", "full-read");
    full.style.display = "none";
    var table = el("table", "scores");
    table.innerHTML =
      "<thead><tr><th>VIBE type</th><th>Flows in</th><th>Flows out</th></tr></thead>";
    var tbody = el("tbody");
    rows.forEach(function (row) {
      var tr = el("tr", row.type === primary.type ? "is-primary" : null);
      tr.innerHTML = "<td>" + row.type + "</td><td>" + row.in + "</td><td>" + row.out + "</td>";
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    full.appendChild(table);
    full.appendChild(el("p", "note",
      "Only your live types were measured this sitting, so the others are not shown."));
    toggle.addEventListener("click", function () {
      var open = full.style.display !== "none";
      full.style.display = open ? "none" : "block";
      toggle.textContent = open ? "See the full read" : "Hide the full read";
    });
    s.appendChild(toggle);
    s.appendChild(full);

    s.appendChild(el("p", "result-tagline", "That&rsquo;s your vibe."));
    var actions = el("div", "footer-actions");
    var again = el("button", "btn", "Retake the VIBE test");
    again.addEventListener("click", function () {
      setState({
        phase: "intro", sweepIdx: 0, deepIdx: 0, confirmIdx: 0,
        sweepPicks: {}, deepResp: {}, confirmResp: {},
        candidate: null, deepQueue: [], confirmQueue: [], reseats: 0
      });
    });
    actions.appendChild(again);
    s.appendChild(actions);
    return s;
  }

  function render() {
    app.innerHTML = "";
    var node;
    if (state.phase === "intro") node = renderIntro();
    else if (state.phase === "sweep") node = renderSweep();
    else if (state.phase === "deep") node = renderDeep();
    else if (state.phase === "confirm") node = renderConfirm();
    else node = renderResult();
    app.appendChild(node);
    window.scrollTo(0, 0);
  }

  render();
})();

</script>
</body>
</html>
